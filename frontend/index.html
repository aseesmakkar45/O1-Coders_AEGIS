<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AEGIS Defense System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes cyberpunkPulse {
            0% {
                box-shadow: 0 0 5px #00FFCC, 0 0 10px #00FFCC, inset 0 0 5px #00FFCC;
                border-color: #00FFCC;
            }

            50% {
                box-shadow: 0 0 15px #00FFCC, 0 0 30px #00FFCC, inset 0 0 15px #00FFCC;
                border-color: #00FFCC;
            }

            100% {
                box-shadow: 0 0 5px #00FFCC, 0 0 10px #00FFCC, inset 0 0 5px #00FFCC;
                border-color: #00FFCC;
            }
        }

        .cyberpunk-border {
            border: 1px solid #00FFCC;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.4), inset 0 0 8px rgba(0, 255, 204, 0.1);
        }

        .cyberpunk-text {
            color: #00FFCC;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.7);
        }

        .throb-infected {
            animation: infectedPulse 2s infinite ease-in-out;
        }

        @keyframes infectedPulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.15);
                opacity: 1;
                box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        .radar-spark {
            filter: drop-shadow(0 0 4px #00FFCC) drop-shadow(0 0 8px #00FFCC);
        }

        .radar-spark-danger {
            filter: drop-shadow(0 0 6px #ef4444) drop-shadow(0 0 12px #ef4444);
        }

        html,
        body {
            overflow-y: auto;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f6f8;
            color: #1e293b;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .map-bg {
            background: #0f172a;
            background-image: radial-gradient(rgba(71, 85, 105, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .pz-glow {
            box-shadow: 0 0 18px 6px rgba(239, 68, 68, 0.5), 0 0 40px 12px rgba(239, 68, 68, 0.2);
        }

        .alert-in {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-8px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .line-draw {
            stroke-dasharray: 200;
            animation: draw 0.8s ease forwards;
        }

        @keyframes draw {
            from {
                stroke-dashoffset: 200;
            }

            to {
                stroke-dashoffset: 0;
            }
        }

        .node-pulse {
            animation: nodePulse 2s ease-in-out infinite;
        }

        @keyframes nodePulse {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.3);
            }
        }

        .tooltip-content {
            display: none;
        }

        .tooltip-trigger:hover .tooltip-content {
            display: block;
        }

        /* Forensic Timeline Animations */
        .timeline-entry {
            animation: slideDownFade 0.3s ease-out;
        }

        @keyframes slideDownFade {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mismatch-glow {
            box-shadow: 0 0 8px 2px rgba(239, 68, 68, 0.35);
        }

        .soft-pulse {
            animation: softPulse 2s ease-in-out 1;
        }

        @keyframes softPulse {

            0%,
            100% {
                box-shadow: none;
            }

            50% {
                box-shadow: 0 0 12px 3px rgba(239, 68, 68, 0.2);
            }
        }

        .burst-banner {
            animation: burstSlide 0.3s ease-out, burstFade 0.5s ease-in 3.5s forwards;
        }

        @keyframes burstSlide {
            from {
                opacity: 0;
                transform: translateY(-100%);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes burstFade {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
                pointer-events: none;
            }
        }

        .card-glow-red {
            box-shadow: 0 0 15px -3px rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3) !important;
        }

        .card-glow-purple {
            box-shadow: 0 0 15px -3px rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.3) !important;
        }

        .constellation-container {
            background: #060a14;
            background-image: radial-gradient(rgba(148, 163, 184, 0.05) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .constellation-svg {
            cursor: crosshair;
        }

        .constellation-svg g.node-group {
            cursor: pointer;
        }

        .heatmap-tooltip {
            pointer-events: none;
            z-index: 200;
        }

        /* Temporal Heatmap specific styles */
        .temporal-grid-container {
            background: #060a14;
        }

        .temporal-cell {
            border-radius: 4px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .temporal-cell:hover {
            transform: scale(1.15);
            z-index: 10;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .cell-green {
            background: #22c55e;
        }

        .cell-yellow {
            background: linear-gradient(135deg, #eab308, #f59e0b);
        }

        .cell-red {
            background: #ef4444;
        }

        /* Gradual Drift: diagonal glow streak */
        .drift-streak {
            background: linear-gradient(45deg, transparent 40%, rgba(255, 255, 255, 0.4) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: streak-slide 2s linear infinite;
        }

        @keyframes streak-slide {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Sudden Spike flash */
        .spike-flash {
            animation: spike-pulse 1s ease-out infinite;
        }

        @keyframes spike-pulse {
            0% {
                filter: brightness(1) drop-shadow(0 0 0px #ef4444);
            }

            50% {
                filter: brightness(1.7) drop-shadow(0 0 8px #ef4444);
            }

            100% {
                filter: brightness(1) drop-shadow(0 0 0px #ef4444);
            }
        }

        /* Sleeper cell */
        .sleeper-overlay {
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.5), 0 0 8px rgba(239, 68, 68, 0.8);
            animation: sleeper-breathe 2.5s ease-in-out infinite;
        }

        @keyframes sleeper-breathe {

            0%,
            100% {
                box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.4), 0 0 6px rgba(239, 68, 68, 0.5);
            }

            50% {
                box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.9), 0 0 16px rgba(239, 68, 68, 1);
            }
        }

        /* Dark Theme Support */
        body.dark-theme,
        body.dark-theme .bg-\[\#f5f6f8\] {
            background-color: #0b1120 !important;
            color: #f1f5f9 !important;
        }

        body.dark-theme .bg-white,
        body.dark-theme .bg-slate-50,
        body.dark-theme .bg-slate-100,
        body.dark-theme .bg-slate-50\/80 {
            background-color: #1e293b !important;
            border-color: #334155 !important;
        }

        body.dark-theme .border-slate-200,
        body.dark-theme .border-slate-100,
        body.dark-theme .border-slate-300 {
            border-color: #334155 !important;
        }

        body.dark-theme .text-slate-800,
        body.dark-theme .text-slate-700,
        body.dark-theme .text-slate-600 {
            color: #f8fafc !important;
        }

        body.dark-theme .text-slate-500,
        body.dark-theme .text-slate-400 {
            color: #94a3b8 !important;
        }

        body.dark-theme .bg-blue-50 {
            background-color: rgba(59, 130, 246, 0.1) !important;
            border-color: rgba(59, 130, 246, 0.2) !important;
        }

        body.dark-theme .bg-red-50 {
            background-color: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.2) !important;
        }

        body.dark-theme .bg-green-50 {
            background-color: rgba(34, 197, 94, 0.1) !important;
            border-color: rgba(34, 197, 94, 0.2) !important;
        }

        body.dark-theme .bg-yellow-50,
        body.dark-theme .bg-amber-50 {
            background-color: rgba(245, 158, 11, 0.1) !important;
            border-color: rgba(245, 158, 11, 0.2) !important;
        }

        body.dark-theme .bg-purple-50 {
            background-color: rgba(168, 85, 247, 0.1) !important;
            border-color: rgba(168, 85, 247, 0.2) !important;
        }

        body.dark-theme .bg-white\/80 {
            background-color: rgba(30, 41, 59, 0.8) !important;
        }

        body.dark-theme .shadow-sm {
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.5) !important;
        }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // Unified 24hr timestamp formatter: HH:MM:SS.mmm
        function fmt24(d) {
            if (!d) d = new Date();
            if (!(d instanceof Date)) d = new Date(d);
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            const ss = String(d.getSeconds()).padStart(2, '0');
            const ms = String(d.getMilliseconds()).padStart(3, '0');
            return `${hh}:${mm}:${ss}.${ms}`;
        }

        const RadarMap = ({ data, onNodeSelect, sessionStart, clearSignal, pZero }) => {
            const containerRef = React.useRef(null);
            const canvasRef = React.useRef(null);
            const tooltipRef = React.useRef(null);
            const [historyDots, setHistoryDots] = React.useState([]);
            const [radarDate, setRadarDate] = React.useState('');
            const historyFetchRef = React.useRef(0);

            // Clear signal resets history visualization immediately
            React.useEffect(() => {
                if (clearSignal > 0) {
                    setHistoryDots([]);
                }
            }, [clearSignal]);

            // Fetch persistent history periodically
            React.useEffect(() => {
                const fetchHistory = () => {
                    const dateStr = radarDate || new Date().toISOString().slice(0, 10);
                    fetch(`/api/history?limit=2000&date_filter=${dateStr}`)
                        .then(r => r.json())
                        .then(d => {
                            if (d.data) {
                                const dots = d.data.map(row => {
                                    const ts = new Date(row.timestamp);
                                    const nid = parseInt(row.node_id) || 0;
                                    let color = '#4ade80'; // default green
                                    if (row.anomaly_type === 'DDOS_ATTACK' || row.anomaly_type === 'IDENTITY_THEFT') color = '#ef4444';
                                    else if (row.anomaly_type === 'GHOST_NODE') color = '#9333ea';
                                    else if (row.anomaly_type === 'LATENCY_SPIKE') color = '#f59e0b';
                                    else if (row.anomaly_type === 'SCHEMA_ROTATION') color = '#f59e0b';
                                    return {
                                        ts, nid, color,
                                        anomaly_type: row.anomaly_type,
                                        severity: row.severity,
                                        http: row.http_status,
                                        json: row.json_status,
                                        trust: row.trust_after,
                                        latency: row.latency_ms,
                                        identity: row.decoded_identity,
                                        isHistory: true
                                    };
                                });
                                setHistoryDots(dots);
                            }
                        }).catch(() => {});
                };
                fetchHistory();
                const interval = setInterval(fetchHistory, 5000);
                return () => clearInterval(interval);
            }, [radarDate]);

            // Stats memoization for the sidebar
            const sweepSummary = React.useMemo(() => {
                if (!data || data.length === 0) return { peakLat: 0, peakNode: '-', maxSleeper: '-', totalEvents: historyDots.length };
                let peakLat = 0, peakNode = '-', maxSleeper = '-';
                const sleeperCounts = {};
                data.forEach(tick => {
                    (tick.nodes || []).forEach(n => {
                        const lat = n.normalizedLat || 0;
                        if (lat > peakLat) { peakLat = Math.round(lat); peakNode = n.node_id; }
                        if (n.realStatus === 'SLEEPER' || n.realStatus === 'CRITICAL') {
                            sleeperCounts[n.node_id] = (sleeperCounts[n.node_id] || 0) + 1;
                        }
                    });
                });
                let maxCt = 0;
                for (const [nid, ct] of Object.entries(sleeperCounts)) {
                    if (ct > maxCt) { maxCt = ct; maxSleeper = nid; }
                }
                return { peakLat, peakNode, maxSleeper, totalEvents: historyDots.length };
            }, [data, historyDots]);

            // Merge live WebSocket dots with persistent history dots
            const allDots = React.useMemo(() => {
                const dots = [];
                // Add persistent history dots
                historyDots.forEach(d => dots.push(d));
                // Add live session dots from WebSocket data
                if (data && data.length > 0) {
                    data.forEach(tick => {
                        const dt = new Date(tick._receivedAt || Date.now());
                        (tick.nodes || []).forEach(n => {
                            const nid = parseInt(n.node_id) || 0;
                            const rs = n.realStatus || 'HEALTHY';
                            let color = '#4ade80';
                            if (rs === 'CRITICAL') color = '#ef4444';
                            else if (rs === 'SLEEPER') color = '#9333ea';
                            else if (rs === 'WARNING') color = '#f59e0b';
                            dots.push({
                                ts: dt, nid, color,
                                anomaly_type: (n.anomalies && n.anomalies[0]) || 'NORMAL',
                                http: n.raw_telemetry?.http_status,
                                json: n.raw_telemetry?.json_payload?.status,
                                trust: n.trust_score,
                                latency: n.normalizedLat,
                                identity: n.decoded_identity,
                                isHistory: false,
                                realStatus: rs
                            });
                        });
                    });
                }
                return dots;
            }, [data, historyDots]);

            React.useEffect(() => {
                if (!containerRef.current || !canvasRef.current || !window.d3) return;
                if (allDots.length === 0 && (!data || data.length === 0)) return;

                const width = containerRef.current.clientWidth || 800;
                const height = 450;
                const radius = Math.min(width, height) / 2 - 40;

                const canvas = canvasRef.current;
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, width, height);

                ctx.save();
                ctx.translate(width / 2, height / 2);

                // Time scale: full day = 360°
                let baseDate;
                if (radarDate) {
                    const parts = radarDate.split('-');
                    baseDate = new Date(parts[0], parts[1] - 1, parts[2], 0, 0, 0);
                } else {
                    const today = new Date();
                    baseDate = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 0, 0, 0);
                }
                const endDate = new Date(baseDate.getTime() + 24 * 60 * 60 * 1000);

                const timeScale = d3.scaleTime()
                    .domain([baseDate, endDate])
                    .range([0, 2 * Math.PI]);

                // Radius scale: node_id 1 = inner, 500 = outer
                const radiusScale = d3.scaleLinear()
                    .domain([1, 500])
                    .range([30, radius])
                    .clamp(true);

                // Draw concentric reference rings
                ctx.strokeStyle = "#e2e8f0";
                ctx.lineWidth = 0.3;
                [50, 100, 150, 200, 250, 300, 350, 400, 450, 500].forEach(nid => {
                    const r = radiusScale(nid);
                    ctx.beginPath();
                    ctx.arc(0, 0, r, 0, 2 * Math.PI);
                    ctx.stroke();
                });

                // Draw radial node ID labels
                ctx.fillStyle = "#94a3b8";
                ctx.font = "bold 8px monospace";
                ctx.textAlign = "left";
                [1, 100, 200, 300, 400, 500].forEach(nid => {
                    const r = radiusScale(nid);
                    ctx.fillText(`N-${nid}`, 4, -r + 3);
                });

                // Draw time axis spokes
                const drawAxes = (hours, isMain) => {
                    hours.forEach(h => {
                        const angle = timeScale(new Date(baseDate.getTime() + h * 3600 * 1000));
                        const x = Math.sin(angle) * (radius + (isMain ? 5 : 0));
                        const y = -Math.cos(angle) * (radius + (isMain ? 5 : 0));
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(x, y);
                        ctx.strokeStyle = isMain ? "#94a3b8" : "#cbd5e1";
                        ctx.lineWidth = isMain ? 0.8 : 0.3;
                        if (!isMain) ctx.setLineDash([2, 3]);
                        else ctx.setLineDash([]);
                        ctx.stroke();

                        if (isMain) {
                            ctx.fillStyle = "#475569";
                            ctx.font = "bold 10px monospace";
                            ctx.textAlign = "center";
                            ctx.textBaseline = "middle";
                            const tx = Math.sin(angle) * (radius + 18);
                            const ty = -Math.cos(angle) * (radius + 18);
                            ctx.fillText(`${String(h).padStart(2, '0')}:00`, tx, ty);
                        }
                    });
                };
                drawAxes([0, 6, 12, 18], true);
                ctx.setLineDash([]);

                // P-Zero orbit track
                if (pZero != null) {
                    const pR = radiusScale(parseInt(pZero));
                    ctx.beginPath();
                    ctx.arc(0, 0, pR, 0, 2 * Math.PI);
                    ctx.strokeStyle = "rgba(249, 115, 22, 0.4)";
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = "rgba(249, 115, 22, 0.9)";
                    ctx.font = "bold 9px monospace";
                    ctx.fillText(`P-ZERO (N-${pZero})`, 4, -pR - 2);
                }

                // Plot all dots
                const now = new Date();
                const fiveMinAgo = now.getTime() - 5 * 60 * 1000;

                // Collect plotted positions for hover detection
                const plotted = [];
                const targetDateString = baseDate.toDateString();

                // Sort dots so P-Zero and active anomalies render on top
                const sortedDots = [...allDots].sort((a, b) => {
                    const isPZA = pZero != null && String(a.nid) === String(pZero);
                    const isPZB = pZero != null && String(b.nid) === String(pZero);
                    if (isPZA !== isPZB) return isPZA ? 1 : -1;
                    return 0;
                });

                sortedDots.forEach(d => {
                    if (!d.ts || isNaN(d.ts.getTime())) return;
                    // Only render current day data (full circle = 24h)
                    if (d.ts.toDateString() !== targetDateString) return;

                    // Map timestamp to today's time for angular position
                    const dotTime = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(),
                        d.ts.getHours(), d.ts.getMinutes(), d.ts.getSeconds(), d.ts.getMilliseconds());
                    const angle = timeScale(dotTime);
                    const nodeR = radiusScale(d.nid);

                    const cx = Math.sin(angle) * nodeR;
                    const cy = -Math.cos(angle) * nodeR;

                    // Age-base opacity: recent = bright, old = faded
                    const age = now.getTime() - d.ts.getTime();
                    const isRecent = d.ts.getTime() >= fiveMinAgo;
                    let alpha = isRecent ? 0.9 : Math.max(0.2, 0.7 - (age / (12 * 60 * 60 * 1000)));

                    const isPZero = pZero != null && String(d.nid) === String(pZero);
                    const dotSize = isPZero ? 4 : (d.anomaly_type !== 'NORMAL' && d.anomaly_type ? 2.5 : 1.5);

                    // P-Zero glow effect (replaces concentric rings)
                    if (isPZero && isRecent) {
                        ctx.beginPath();
                        ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
                        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 8);
                        glow.addColorStop(0, 'rgba(249, 115, 22, 0.5)');
                        glow.addColorStop(1, 'rgba(249, 115, 22, 0)');
                        ctx.fillStyle = glow;
                        ctx.fill();
                    }

                    // Draw dot
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(cx, cy, dotSize, 0, 2 * Math.PI);
                    ctx.fillStyle = d.color;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;

                    plotted.push({ cx, cy, ...d, dotSize });
                });

                const isToday = baseDate.toDateString() === new Date().toDateString();

                if (isToday) {
                    // Session highlight: glowing arc from session start to current time
                    const nowAngle = timeScale(new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(),
                        now.getHours(), now.getMinutes(), now.getSeconds()));
                    
                    const ssDate = sessionStart || now;
                    let sessionStartAngle = timeScale(new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(),
                        ssDate.getHours(), ssDate.getMinutes(), ssDate.getSeconds()));

                    ctx.save();
                    // Session background fill arc (subtle)
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, radius, sessionStartAngle - Math.PI/2, nowAngle - Math.PI/2);
                    ctx.closePath();
                    const sessionGrad = ctx.createRadialGradient(0, 0, 20, 0, 0, radius);
                    sessionGrad.addColorStop(0, 'rgba(59, 130, 246, 0.02)');
                    sessionGrad.addColorStop(0.5, 'rgba(59, 130, 246, 0.06)');
                    sessionGrad.addColorStop(1, 'rgba(59, 130, 246, 0.03)');
                    ctx.fillStyle = sessionGrad;
                    ctx.fill();

                    // Session arc edge line
                    ctx.beginPath();
                    ctx.arc(0, 0, radius, sessionStartAngle - Math.PI/2, nowAngle - Math.PI/2);
                    ctx.strokeStyle = 'rgba(59, 130, 246, 0.15)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Current time needle
                    const needleX = Math.sin(nowAngle) * radius;
                    const needleY = -Math.cos(nowAngle) * radius;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(needleX, needleY);
                    ctx.strokeStyle = "#3b82f6";
                    ctx.lineWidth = 1.5;
                    ctx.shadowColor = "rgba(59,130,246,0.6)";
                    ctx.shadowBlur = 4;
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    // Now label
                    ctx.fillStyle = "#3b82f6";
                    ctx.font = "bold 8px monospace";
                    ctx.textAlign = "center";
                    ctx.fillText("NOW", Math.sin(nowAngle) * (radius + 28), -Math.cos(nowAngle) * (radius + 28));
                    ctx.restore();
                }

                ctx.restore(); // restore main translate

                // Mouse interaction
                const handleMouseMove = (e) => {
                    const rect = canvas.getBoundingClientRect();

            return (

        const NodeDrilldownSubgraphs = ({ nodeId, history }) => {

                            // HTTP status from multiple sources
                            let http_code = 200;
                            const rawHttp = raw.http_status || n.http_response_code || raw.http_response_code;
                            if (rawHttp !== undefined) {
                                http_code = parseInt(rawHttp);
                                if (isNaN(http_code)) http_code = 200;
                            }

                            // Timestamp anchored to system clock via _receivedAt
                            const rAt = tick._receivedAt ? new Date(tick._receivedAt) : new Date(Date.now() - (history.length - tickIdx) * 5000);

                            Discrepancy Alert: Trust Score HIGH ({Math.round(latestTrust)}) while Z-Score Anomalous ({tz.toFixed(1)}σ) - Shadow Controller Deception Detected.

                                <text x={xScale(p.rAt)} y={latScale(p.response_time_ms) - 8} fontSize="8" fill={p.response_time_ms > latScale.domain()[1] * 0.8 ? "#ef4444" : "#64748b"} textAnchor="middle" fontWeight="bold">{Math.round(p.response_time_ms)}ms</text>

                                <text x={xScale(p.rAt)} y={loadScale(p.L) - 8} fontSize="8" fill={p.L > 0.7 ? "#ef4444" : "#64748b"} textAnchor="middle" fontWeight="bold">{Math.round(p.L * 100)}%</text>
                            </g>
