        function useDataStream(wsUrl) {
            const [history, setHistory] = useState([]);
            const [datasetPos, setDatasetPos] = useState(0);
            const [latencySeries, setLatencySeries] = useState([]);
            const [anomalySeries, setAnomalySeries] = useState([]);
            const [attackVectors, setAttackVectors] = useState({});
            const [latestIncident, setLatestIncident] = useState(null);

            const seenTimestampsRef = useRef(new Set());
            const sessionStartRef = useRef(new Date());

            useEffect(() => {
                const ws = new WebSocket(wsUrl);
                ws.onopen = () => {
                    sessionStartRef.current = new Date();
                };
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (!data || !data.nodes) return;

                        const validNodes = data.nodes.filter(n => {
                            const ts = n.raw_telemetry?.timestamp || data.dataset_position;
                            return n.node_id !== undefined && n.node_id !== null && ts !== undefined;
                        });

                        const normalizedNodes = validNodes.map(n => {
                            const d = n.raw_telemetry || {};
                            // Backend sends load_value (float), schema may also send load_val or L_V1
                            const normalizedLoad = Number(d.load_value || d.load_val || d.L_V1 || d.system_load || 0);
                            // Backend sends latency (seconds) OR response_time_ms (ms)
                            const lat = d.response_time_ms ? Number(d.response_time_ms) : (Number(d.latency || 0) * 1000);
                            const z_score = Number(d.z_score || d.deviation || 0);

                            const ts = d.timestamp || data.dataset_position;
                            const dedupeKey = `${n.node_id}-${ts}`;
                            let is_replay = false;
                            if (seenTimestampsRef.current.has(dedupeKey)) {
                                is_replay = true;
                            } else {
                                seenTimestampsRef.current.add(dedupeKey);
                            }

                            const http_response = parseInt(d.http_status || n.http_response_code || 200);
                            const json_status = d.json_payload ? (d.json_payload.status || '') : '';

                            let realStatus = 'HEALTHY';
                            if (http_response === 429 || http_response >= 500) {
                                realStatus = 'CRITICAL';
                            } else if (http_response === 206 || (lat > 200 && json_status === 'OPERATIONAL')) {
                                realStatus = 'SLEEPER';
                            } else if (http_response === 200 && lat < 150) {
                                realStatus = 'HEALTHY';
                            } else {
                                realStatus = 'WARNING';
                            }

                            return {
                                ...n,
                                normalizedLoad,
                                normalizedLat: lat,
                                z_score,
                                is_replay,
                                realStatus,
                                _ts: ts
                            };
                        });

                        data.nodes = normalizedNodes;
                        data._receivedAt = new Date().toISOString();

                        setDatasetPos(data.dataset_position || 0);
                        if (data.metrics) {
                            setLatencySeries(data.metrics.latency_series || []);
                            setAnomalySeries(data.metrics.anomaly_series || []);
                            setAttackVectors(data.metrics.attack_vectors || {});
                            if (data.metrics.latest_incident) setLatestIncident(data.metrics.latest_incident);
                        }

                        setHistory(prev => {
                            const next = [...prev, data];
                            const cutoff = Date.now() - 600 * 1000;
                            return next.filter(tick => new Date(tick._receivedAt).getTime() >= cutoff);
                        });
                    } catch (e) { }
                };
                return () => ws.close();
            }, [wsUrl]);

            return { history, datasetPos, latencySeries, anomalySeries, attackVectors, latestIncident, sessionStart: sessionStartRef.current };
        }

        // ===== SHADOW CONTROLLER MAP COMPONENT =====
        function ShadowControllerMap({ currentState, killedNodes, setKilledNodes }) {
            const svgRef = React.useRef();
            const layoutStateRef = React.useRef(new Map());
            const [selectedNode, setSelectedNode] = React.useState(null);

            React.useEffect(() => {
                if (!currentState || !currentState.propagation_graph || !currentState.attribution_suspects) return;

                let simulation, timer;
                try {
                    const suspectsObj = currentState.attribution_suspects || {};
                    const topNodes = Object.values(suspectsObj)
                        .filter(s => !killedNodes.has(String(s.node_id)))
                        .sort((a,b) => b.final_score - a.final_score);
                    
                    const highestScoreNodeId = topNodes.length > 0 ? String(topNodes[0].node_id) : null;
                    const pZeroId = currentState.patient_zero && currentState.patient_zero.confidence > 0 ? String(currentState.patient_zero.patient_zero_node) : null;

                    const nodes = [];
                    const links = [];
                    
                    const nodeSet = new Set();
                    currentState.propagation_graph.forEach(e => {
                        nodeSet.add(e.source);
                        nodeSet.add(e.target);
                    });

                    // Guarantee that the Top 10 highest-threat suspects ALWAYS appear on the map
                    topNodes.slice(0, 10).forEach(s => {
                        nodeSet.add(String(s.node_id));
                    });
                    
                    if (pZeroId) {
                        nodeSet.add(pZeroId);
                    }
                    
                    // Get dimensions FIRST so nodes can be positioned
                    let width = svgRef.current.clientWidth;
                    let height = svgRef.current.clientHeight;
                    if (!width || width === 0) width = 800;
                    if (!height || height === 0) height = 500;

                    // Safe zone boundaries (avoiding badge at top-left, legend at bottom-left)
                    const PADDING_TOP = 90;
                    const PADDING_LEFT = 80;
                    const PADDING_RIGHT = 40;
                    const PADDING_BOTTOM = 120;

                    nodeSet.forEach(id => {
                        if (killedNodes.has(String(id))) return;
                        
                        let n;
                        if (suspectsObj[id]) {
                            n = { id: String(id), ...suspectsObj[id] };
                        } else if (String(id) === pZeroId) {
                            // Force P-Zero to exist on graph even if it has no connections or threat score yet
                            n = { id: String(id), final_score: 0.0, breakdown: {} };
                        } else {
                            return; // Skip normal nodes not in suspects
                        }

                        let prev = layoutStateRef.current.get(n.id);
                        if (prev) {
                            n.x = Math.max(PADDING_LEFT, Math.min(width - PADDING_RIGHT, prev.x));
                            n.y = Math.max(PADDING_TOP, Math.min(height - PADDING_BOTTOM, prev.y));
                        } else {
                            n.x = PADDING_LEFT + Math.random() * (width - PADDING_LEFT - PADDING_RIGHT);
                            n.y = PADDING_TOP + Math.random() * (height - PADDING_TOP - PADDING_BOTTOM);
                        }
                        n.vx = 0;
                        n.vy = 0;
                        nodes.push(n);
                    });

                    currentState.propagation_graph.forEach(e => {
                        if(killedNodes.has(String(e.source)) || killedNodes.has(String(e.target))) return;
                        links.push({ source: String(e.source), target: String(e.target), weight: e.weight });
                    });

                    d3.select(svgRef.current).selectAll("*").remove();

                    if (nodes.length === 0) {
                        d3.select(svgRef.current).append("text").attr("x", 20).attr("y", 20).attr("fill", "#64748b").text("Awaiting telemetry...");
                        return;
                    }

                    const reverseAdj = {};
                    links.forEach(l => {
                        if(!reverseAdj[l.target]) reverseAdj[l.target] = [];
                        reverseAdj[l.target].push({src: l.source, weight: l.weight || 0});
                    });

                    function findUpstreamPath(startId) {
                        let pathEdges = new Set();
                        let current = startId;
                        let max_iter = 50;
                        while(reverseAdj[current] && reverseAdj[current].length > 0 && max_iter > 0) {
                            max_iter--;
                            let sorted = [...reverseAdj[current]].sort((a,b) => b.weight - a.weight);
                            let best = sorted[0].src;
                            pathEdges.add(`${best}->${current}`);
                            if(pathEdges.has(`${current}->${best}`) || pathEdges.size > 20) break;
                            current = best;
                        }
                        return pathEdges;
                    }

                    const svg = d3.select(svgRef.current)
                        .attr("viewBox", `0 0 ${width} ${height}`);
                    
                    const defs = svg.append("defs");
                    
                    const filter = defs.append("filter").attr("id", "neonGlow");
                    filter.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "coloredBlur");
                    const merge = filter.append("feMerge");
                    merge.append("feMergeNode").attr("in", "coloredBlur");
                    merge.append("feMergeNode").attr("in", "SourceGraphic");

                    const shadowFilter = defs.append("filter").attr("id", "shadowCommandGlow");
                    shadowFilter.append("feGaussianBlur").attr("stdDeviation", "6").attr("result", "blur");
                    shadowFilter.append("feFlood").attr("flood-color", "#ef4444").attr("flood-opacity", "0.8");
                    shadowFilter.append("feComposite").attr("in", "SourceGraphic").attr("in2", "blur").attr("operator", "over");

                    // Check if we have ANY saved positions (meaning this isn't the first render)
                    const hasSavedPositions = layoutStateRef.current.size > 0 && 
                        nodes.some(n => layoutStateRef.current.has(n.id));

                    // Physics — only use forceCenter on the FIRST render
                    simulation = d3.forceSimulation(nodes)
                        .alphaDecay(0.05)
                        .alpha(hasSavedPositions ? 0.05 : 0.3)
                        .force("link", d3.forceLink(links).id(d => d.id).distance(80).strength(d => Math.min(0.5, (d.weight || 0.1) * 0.3)))
                        .force("charge", d3.forceManyBody().strength(d => d.id === highestScoreNodeId ? -300 : -150))
                        .force("collide", d3.forceCollide().radius(30).iterations(2));

                    // Only pull to center on a fresh start — not on data updates!
                    // Offset center to avoid badge overlay (top-left) and legend (bottom-left)
                    const centerX = width * 0.5;
                    const centerY = height * 0.5 + 20;
                    
                    if (!hasSavedPositions) {
                        simulation.force("center", d3.forceCenter(centerX, centerY));
                    } else {
                        // Keep nodes on-screen with moderate centering
                        simulation.force("x", d3.forceX(centerX).strength(0.08));
                        simulation.force("y", d3.forceY(centerY).strength(0.08));
                    }

                    const linkG = svg.append("g");
                    const nodeG = svg.append("g");

                    let attackPathEdges = new Set();
                    if(selectedNode && selectedNode.id) {
                        attackPathEdges = findUpstreamPath(selectedNode.id);
                    }

                    const link = linkG
                        .attr("stroke", "#94a3b8")
                        .attr("stroke-opacity", 0.25)
                        .selectAll("line")
                        .data(links)
                        .join("line")
                        .attr("stroke-width", d => Math.max(0.5, (d.weight || 0.1) * 1.5))
                        .attr("stroke", d => {
                            let sid = d.source.id || d.source;
                            let tid = d.target.id || d.target;
                            return attackPathEdges.has(`${sid}->${tid}`) ? "#ef4444" : "#94a3b8";
                        })
                        .attr("stroke-opacity", d => {
                            let sid = d.source.id || d.source;
                            let tid = d.target.id || d.target;
                            return attackPathEdges.has(`${sid}->${tid}`) ? 0.9 : 0.25;
                        });

                    const node = nodeG
                        .selectAll("g")
                        .data(nodes)
                        .join("g")
                        .call(drag(simulation));

                    const getColor = (d) => {
                        // Top suspect is ALWAYS red
                        if (d.id === highestScoreNodeId) return "#ef4444";
                        // Color by overall threat level (final_score)
                        let score = d.final_score || 0;
                        if (score > 0.5) return "#ef4444";   // High threat = red
                        if (score > 0.3) return "#f59e0b";   // Medium threat = orange
                        return "#3b82f6";                     // Low threat = blue
                    };

                    node.append("circle")
                        .attr("class", d => d.id === highestScoreNodeId ? "shadow-controller-pulse" : "")
                        .attr("r", d => {
                            let base = 5;
                            if(d.final_score && !isNaN(d.final_score)) base += (d.final_score * 20);
                            if(d.id === highestScoreNodeId) base *= 1.3;
                            return isNaN(base) ? 5 : base;
                        })
                        .attr("fill", d => getColor(d))
                        .attr("stroke", d => d.id === highestScoreNodeId ? "#ffffff" : "none")
                        .attr("stroke-width", d => d.id === highestScoreNodeId ? 2 : 0)
                        .attr("filter", d => {
                            if(d.id === highestScoreNodeId) return "url(#shadowCommandGlow)";
                            if((d.final_score || 0) > 0.5) return "url(#neonGlow)";
                            return null;
                        })
                        .style("cursor", "pointer")
                        .on("click", (e, d) => {
                            setSelectedNode(d);
                        });

                    node.append("text")
                        .text(d => `N-${d.id}`)
                        .attr("x", d => {
                            let finalX = (d.final_score && !isNaN(d.final_score)) ? 10 + (d.final_score * 20) : 12;
                            return isNaN(finalX) ? 12 : finalX;
                        })
                        .attr("y", 3)
                        .attr("fill", "#f8fafc")
                        .attr("font-size", d => d.id === highestScoreNodeId ? "12px" : "10px")
                        .attr("font-weight", d => d.id === highestScoreNodeId ? "bold" : "normal")
                        .attr("font-family", "monospace");

                    const topLabel = svg.append("g").attr("class", "top-label").style("opacity", 0);
                    topLabel.append("rect").attr("fill", "#ef4444").attr("rx", 3).attr("ry", 3);
                    topLabel.append("text").text("Suspected Command Node").attr("fill", "white").attr("font-size", "10px").attr("font-weight", "bold").attr("x", 4).attr("y", 9);
                    
                    const pZeroLabel = svg.append("g").attr("class", "pzero-label").style("opacity", 0);
                    pZeroLabel.append("rect").attr("fill", "#f59e0b").attr("rx", 3).attr("ry", 3);
                    pZeroLabel.append("text").text("Patient Zero").attr("fill", "white").attr("font-size", "10px").attr("font-weight", "bold").attr("x", 4).attr("y", 9);
                    
                    timer = d3.timer((elapsed) => {
                        node.selectAll("circle.shadow-controller-pulse").attr("r", d => {
                            let score = (d && d.final_score && !isNaN(d.final_score)) ? d.final_score : 0;
                            let base = 5 + (score * 20);
                            let r = (base * 1.3) + Math.sin(elapsed / 150) * 3;
                            return isNaN(r) ? 5 : r;
                        });
                    });

                    simulation.on("tick", () => {
                        // HARD CLAMP: force every node to stay inside the safe zone
                        nodes.forEach(d => {
                            d.x = Math.max(PADDING_LEFT, Math.min(width - PADDING_RIGHT, d.x));
                            d.y = Math.max(PADDING_TOP, Math.min(height - PADDING_BOTTOM, d.y));
                        });

                        link
                            .attr("x1", d => d.source.x)
                            .attr("y1", d => d.source.y)
                            .attr("x2", d => d.target.x)
                            .attr("y2", d => d.target.y);
                        
                        node
                            .attr("transform", d => `translate(${d.x},${d.y})`);
                        
                        const topNodeData = nodes.find(n => n.id === highestScoreNodeId);
                        if(topNodeData) {
                            topLabel.style("opacity", 1)
                                .attr("transform", `translate(${topNodeData.x - 65}, ${topNodeData.y - 35})`);
                            topLabel.select("rect").attr("width", 135).attr("height", 14);
                        } else {
                            topLabel.style("opacity", 0);
                        }

                        const pZeroNodeData = pZeroId ? nodes.find(n => n.id === pZeroId) : null;
                        if(pZeroNodeData) {
                            // If Patient Zero is the same as Command Node, shift label down to avoid overlap
                            let yOffset = (pZeroId === highestScoreNodeId) ? 20 : -35;
                            pZeroLabel.style("opacity", 1)
                                .attr("transform", `translate(${pZeroNodeData.x - 35}, ${pZeroNodeData.y + yOffset})`);
                            pZeroLabel.select("rect").attr("width", 72).attr("height", 14);
                        } else {
                            pZeroLabel.style("opacity", 0);
                        }

                        // Save positions for persistence across re-renders
                        nodes.forEach(n => {
                            layoutStateRef.current.set(n.id, { x: n.x, y: n.y, vx: n.vx || 0, vy: n.vy || 0 });
                        });
                    });

                    function drag(sim) {
                        function dragstarted(event) { if (!event.active) sim.alphaTarget(0.3).restart(); event.subject.fx = event.subject.x; event.subject.fy = event.subject.y; }
                        function dragged(event) { event.subject.fx = event.x; event.subject.fy = event.y; }
                        function dragended(event) { if (!event.active) sim.alphaTarget(0); event.subject.fx = null; event.subject.fy = null; }
                        return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
                    }
                } catch(error) {
                    console.error("[Graph Critical Failure]", error);
                    d3.select(svgRef.current).selectAll("*").remove();
                    d3.select(svgRef.current).append("text").attr("x", 20).attr("y", 30).attr("fill", "#ef4444").attr("font-family", "monospace").text("D3 ENGINE ERROR: " + error.message);
                }
                
                return () => {
                    if (simulation) simulation.stop();
                    if (timer) timer.stop();
                };
            }, [currentState, killedNodes, selectedNode]);

            const suspectsObj = currentState?.attribution_suspects || {};
            const topNodes = Object.values(suspectsObj)
                .filter(s => !killedNodes.has(String(s.node_id)))
                .sort((a,b) => b.final_score - a.final_score);
                
            const leaderboard = topNodes.slice(0, 5);

            const handleKillSwitch = async (id) => {
                const nid = String(id);
                setKilledNodes(prev => new Set(prev).add(nid));
                setSelectedNode(null);
                try {
                    await fetch(`/api/simulate/remove_node/${nid}`, { method: 'POST' });
                } catch(e) {}
            };

            const BarComponent = ({ label, value, color }) => (
                <div className="flex items-center gap-2 mb-1">
                    <span className="text-[8px] uppercase tracking-widest text-slate-500 w-[55px] text-right">{label}</span>
                    <div className="flex-1 bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div className="h-full rounded-full" style={{width: `${Math.min(100, Math.max(0, value * 100))}%`, backgroundColor: color}}></div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-full w-full text-slate-200">
                    <div className="flex-1 flex flex-col relative bg-[#0a0f1e]" style={{overflow: 'hidden'}}>
                        <div className="absolute top-4 left-4 z-10 p-3 bg-black/40 backdrop-blur rounded border border-slate-700/50">
                            <h3 className="text-[12px] font-bold text-white uppercase tracking-widest flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-pulse"></span>
                                Top Shadow Controller Visualized
                            </h3>
                            <p className="text-[9px] text-slate-400 mt-1 uppercase">Click nodes to analyze Upstream Attack Path</p>
                        </div>
                        
                        <div className="absolute bottom-4 left-4 z-10 p-3 bg-black/60 backdrop-blur rounded border border-slate-700/50">
                            <h4 className="text-[10px] font-bold uppercase tracking-widest text-slate-300 mb-2 border-b border-slate-700 pb-1">Legend</h4>
                            <div className="flex items-center gap-2 text-[9px] text-slate-400 mb-1"><span className="w-3 h-3 rounded-full bg-blue-500"></span> Low Threat (&lt;30%)</div>
                            <div className="flex items-center gap-2 text-[9px] text-slate-400 mb-1"><span className="w-3 h-3 rounded-full bg-orange-400"></span> Medium Threat (30-50%)</div>
                            <div className="flex items-center gap-2 text-[9px] text-slate-400 mb-1"><span className="w-3 h-3 rounded-full bg-red-500"></span> High Threat (&gt;50%)</div>
                            <div className="mt-2 text-[8px] font-mono text-slate-500">Size = Network PageRank Influence</div>
                            <div className="text-[8px] font-mono text-slate-500">Edge Thickness = Transition Frequency</div>
                        </div>

                        {selectedNode && (
                            <div className="absolute top-4 right-4 z-10 w-[240px] p-4 bg-slate-900 border border-slate-600 rounded-lg shadow-2xl">
                                <div className="flex justify-between items-start mb-2">
                                    <h3 className="text-sm font-bold text-white font-mono">Node {selectedNode.node_id}</h3>
                                    <button onClick={() => setSelectedNode(null)} className="text-slate-400 hover:text-white">✕</button>
                                </div>
                                <p className="text-[10px] text-slate-400 mb-3 leading-tight">Upstream chain to original controller highlighted in red.</p>
                                <button 
                                    onClick={() => handleKillSwitch(selectedNode.node_id)}
                                    className="w-full bg-red-600 hover:bg-red-500 text-white font-bold text-[11px] uppercase tracking-widest py-2 rounded transition-colors shadow-[0_0_10px_rgba(239,68,68,0.4)] hover:shadow-[0_0_15px_rgba(239,68,68,0.7)]"
                                >
                                    INITIATE KILL SWITCH
                                </button>
                            </div>
                        )}
                        <svg className="w-full h-full" ref={svgRef} style={{overflow: 'hidden'}}></svg>
                    </div>

                    <div className="w-[420px] bg-slate-900 border-l border-slate-800 flex flex-col shrink-0 relative z-20">
                        <div className="p-4 border-b border-slate-800 shrink-0">
                            <h2 className="text-[12px] font-bold uppercase tracking-widest text-[#00FFCC]">Top Attack Suspects</h2>
                            <p className="text-[9px] text-slate-400 mt-1 uppercase">Attribution certainty ranking via mathematically-inferred topology</p>
                            
                            {killedNodes.size > 0 && (
                                <div className="mt-3 p-3 bg-red-950/30 rounded border border-red-900/50">
                                    <div className="text-[10px] text-red-400 font-bold mb-1 flex items-center gap-2">
                                        <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                        NETWORK INFLUENCE REDUCED BY ~{Math.min(99, killedNodes.size * 18)}%
                                    </div>
                                    <div className="flex flex-wrap gap-1 mt-2">
                                        {[...killedNodes].map(id => (
                                            <span key={id} className="px-1.5 py-0.5 bg-red-900/40 border border-red-500/50 text-red-200 text-[9px] rounded font-mono shadow-sm">
                                                Quarantined: N-{id}
                                            </span>
                                        ))}
                                    </div>
                                    <button onClick={() => setKilledNodes(new Set())} className="mt-2 text-[8px] text-slate-400 hover:text-white underline uppercase">Refresh Simulation (Restore State)</button>
                                </div>
                            )}
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {leaderboard.length === 0 && <div className="text-center text-[11px] text-slate-500 mt-10">Waiting for graph formation...</div>}
                            
                            {leaderboard.map((s, index) => (
                                <div key={s.node_id} className={`bg-slate-800/80 border ${index === 0 ? 'border-red-500/50 shadow-[0_0_15px_rgba(239,68,68,0.1)]' : 'border-slate-700/60'} p-4 rounded-xl relative overflow-hidden transition-all delay-75`}>
                                    {index === 0 && (
                                        <div className="absolute top-0 right-0 bg-red-500 text-white text-[8px] font-bold px-2 py-0.5 rounded-bl uppercase tracking-widest shadow-md">
                                            #1 Controller
                                        </div>
                                    )}
                                    <div className="flex justify-between items-center mb-3">
                                        <div className="flex items-center gap-3">
                                            <div className="w-6 h-6 rounded-full bg-slate-900 flex items-center justify-center border border-slate-700 font-bold text-slate-400 text-[10px]">#{index + 1}</div>
                                            <span className={`text-[15px] font-black font-mono ${index === 0 ? 'text-white' : 'text-slate-300'}`}>N-{s.node_id}</span>
                                        </div>
                                        <div className="text-[16px] font-bold font-mono text-[#00FFCC]">{(s.final_score * 100).toFixed(1)}% <span className="text-[9px] text-slate-500 font-sans uppercase">Threat</span></div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-3">
                                        <div>
                                            <BarComponent label="Influence" value={s.breakdown.pagerank} color="#3b82f6" />
                                            <BarComponent label="Anomaly" value={s.breakdown.anomaly} color="#ef4444" />
                                            <BarComponent label="Centrality" value={s.breakdown.betweenness} color="#8b5cf6" />
                                        </div>
                                        <div className="flex flex-col justify-center">
                                            <div className="text-[8px] uppercase tracking-widest text-slate-500 mb-1">Temporal Stability</div>
                                            <div className="flex items-center gap-1">
                                                {[1,2,3,4,5].map(i => (
                                                    <div key={i} className={`h-1.5 flex-1 rounded-sm ${i <= Math.ceil(s.breakdown.stability * 5) ? 'bg-green-400' : 'bg-slate-700'}`}></div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-slate-900/60 rounded-lg p-2.5 border border-slate-700/50">
                                        <ul className="space-y-1.5">
                                            {s.reasoning.map((r, i) => (
                                                <li key={i} className="text-[9px] text-slate-300 flex items-start gap-1.5 leading-tight">
                                                    <span className="text-red-500/80 mt-[1px]">▸</span> {r}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const { history, datasetPos, latencySeries, anomalySeries, attackVectors, latestIncident, sessionStart } = useDataStream(`${wsProtocol}//${window.location.host}/ws`);

            const [isLive, setIsLive] = useState(true);
            const [playbackIndex, setPlaybackIndex] = useState(0);
            const [allAlerts, setAllAlerts] = useState([]);
            const [selectedNodeId, setSelectedNodeId] = useState(null);
            const [hoveredNodeId, setHoveredNodeId] = useState(null);
            const [activeTab, setActiveTab] = useState('overview');
            const [overlayNode, setOverlayNode] = useState(null);
            const [heatmapHover, setHeatmapHover] = useState(null);
            const [trustHover, setTrustHover] = useState(null);
            const [temporalHover, setTemporalHover] = useState(null);
            const [killedNodes, setKilledNodes] = useState(new Set());

            const trustDevRef = useRef(null);
            const userScrolledAwayRef = useRef(false);

            useEffect(() => {
                const el = trustDevRef.current;
                if (el && !userScrolledAwayRef.current) {
                    el.scrollLeft = el.scrollWidth;
                }
            }, [history]);

            const trustDevHistory = useMemo(() => history.slice(-200), [history]);

            // Persistent History UX
            const [isHistoryOpen, setIsHistoryOpen] = useState(false);
            const [historyLog, setHistoryLog] = useState([]);
            const [historySummary, setHistorySummary] = useState(null);
            const [confirmingDelete, setConfirmingDelete] = useState(false);

            // History Filters
            const [histSearch, setHistSearch] = useState('');
            const [histSeverity, setHistSeverity] = useState('');
            const [histType, setHistType] = useState('');
            const [histDate, setHistDate] = useState('');
            const [histTimeChunk, setHistTimeChunk] = useState('');
            const [histPage, setHistPage] = useState(0);
            const [histClearCounter, setHistClearCounter] = useState(0);
            const [regSearch, setRegSearch] = useState('');

            const [isPaused, setIsPaused] = useState(false);
            const [schemaLogs, setSchemaLogs] = useState([]);
            const lastSchemaRef = useRef({});
            const [selectedSchemaLog, setSelectedSchemaLog] = useState(null);
            const [schemaFilterType, setSchemaFilterType] = useState('All');
            const [schemaSearchQuery, setSchemaSearchQuery] = useState('');
            const [showBurst, setShowBurst] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [systemTime, setSystemTime] = useState(fmt24());

            useEffect(() => {
                const timer = setInterval(() => setSystemTime(fmt24()), 100);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (isDarkMode) document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }, [isDarkMode]);

            const togglePause = useCallback(() => {
                fetch('/api/toggle_pause', { method: 'POST' })
                    .then(r => r.json())
                    .then(d => setIsPaused(d.is_paused));
            }, []);

            const fetchHistoryDB = useCallback(() => {
                const query = new URLSearchParams({ limit: 100, offset: histPage * 100 });
                if (histSearch.trim()) query.append('node_id', histSearch.trim());
                if (histSeverity) query.append('severity', histSeverity);
                if (histType) query.append('anomaly_type', histType);
                if (histDate) query.append('date_filter', histDate);
                if (histTimeChunk) query.append('time_chunk', histTimeChunk);

                fetch(`/api/history?${query.toString()}`)
                    .then(r => r.json())
                    .then(d => { if (d.data) setHistoryLog(d.data); });

                fetch('/api/history/summary')
                    .then(r => r.json())
                    .then(d => { if (d.data) setHistorySummary(d.data); });
            }, [histSearch, histSeverity, histType, histDate, histTimeChunk, histPage]);

            const clearHistoryDB = useCallback(async () => {
                if (!confirmingDelete) {
                    setConfirmingDelete(true);
                    setTimeout(() => setConfirmingDelete(false), 4000);
                    return;
                }
                setConfirmingDelete(false);
                try {
                    const r = await fetch('/api/history/clear', { method: 'DELETE' });
                    const d = await r.json();
                    if (d.status === 'success') {
                        setHistoryLog([]);
                        setHistorySummary(null);
                        setHistClearCounter(c => c + 1);
                        setIsHistoryOpen(false);
                    }
                } catch(e) { console.error('Delete failed:', e); }
            }, [confirmingDelete]);

            useEffect(() => {
                if (isHistoryOpen) fetchHistoryDB();
            }, [isHistoryOpen, fetchHistoryDB]);

            const alertsEndRef = useRef(null);
            const lastAlertKey = useRef(new Set());

            // WebSocket stream extracted to useDataStream Hook

            useEffect(() => {
                if (history.length === 0) return;
                const latest = history[history.length - 1];
                if (!latest || !latest.nodes) return;

                const newSchemaLogs = [];
                const backendLog = latest.new_logs?.find(l => String(l.node_id) === String(latest.nodes?.[0]?.node_id));
                const timestamp = backendLog?.timestamp || (latest._receivedAt ? fmt24(new Date(latest._receivedAt)) : fmt24());

                const newAlerts = [];
                const eventsToProcess = latest.tick_events || [];
                eventsToProcess.forEach(te => {
                    const n = latest.nodes.find(node => String(node.node_id) === String(te.node_id));
                    if (!n) return;
                    const nodeId = n.node_id;
                    // Log the chronologically ordered event
                    const key = `${latest.dataset_position}-${nodeId}`;
                    if (!lastAlertKey.current.has(key)) {
                        const isAnomaly = n.anomalies && n.anomalies.length > 0;
                        newAlerts.push({
                            timestamp,
                            timestamp_iso: latest._receivedAt ? new Date(latest._receivedAt).toISOString() : new Date().toISOString(),
                            node_id: nodeId,
                            anomaly_type: isAnomaly ? n.anomalies[0] : 'NORMAL',
                            http: n.raw_telemetry ? n.raw_telemetry.http_status : 200,
                            json: n.raw_telemetry && n.raw_telemetry.json_payload ? n.raw_telemetry.json_payload.status : 'OPERATIONAL',
                            latency: n.raw_telemetry ? Math.round((n.raw_telemetry.latency || 0) * 1000) : 0,
                            load: n.raw_telemetry ? Math.round((n.raw_telemetry.load_value || 0) * 100) : 0,
                            trust: Math.round(n.trust_score || 100),
                            isAnomaly,
                        });
                        lastAlertKey.current.add(key);
                        if (lastAlertKey.current.size > 1000) {
                            const arr = [...lastAlertKey.current];
                            lastAlertKey.current = new Set(arr.slice(arr.length - 500));
                        }
                    }

                    // Schema Console Tracker Logic
                    const currentSchema = n.raw_telemetry?.schema_version || '1';
                    const hasSchemaAnomaly = n.anomalies && (n.anomalies.includes('SCHEMA_ROTATION') || n.anomalies.includes('SCHEMA'));
                    const isGeneralAnomaly = n.anomalies && n.anomalies.length > 0;

                    const tracked = lastSchemaRef.current[nodeId];

                    if (!tracked) {
                        // Node Discovery Log
                        lastSchemaRef.current[nodeId] = { version: currentSchema, status: isGeneralAnomaly ? 'anomaly' : 'stable' };
                        newSchemaLogs.push({
                            id: `${latest.dataset_position}-${nodeId}-init`,
                            time: timestamp,
                            node: `Node-${nodeId}`,
                            nodeId: nodeId,
                            version: `Schema v${currentSchema.replace('v', '')}`,
                            status: isGeneralAnomaly ? 'Parsed - Anomalies Detected' : 'Parsed Successfully',
                            color: isGeneralAnomaly ? 'red' : 'green',
                            raw: n.raw_telemetry,
                            trust: n.trust_score,
                            anomalies: n.anomalies || []
                        });
                    } else {
                        const versionChanged = tracked.version !== currentSchema;
                        const currentlyInAnomaly = isGeneralAnomaly;
                        const previouslyInAnomaly = tracked.status === 'anomaly';
                        let shouldLog = false;
                        let logStatus = '';
                        let logColor = '';

                        // Rule 1: Always log anomalies
                        if (hasSchemaAnomaly) {
                            shouldLog = true;
                            logStatus = 'Schema Mismatch - Flagged';
                            logColor = 'red';
                        }
                        // Rule 2/3: Version changed but parsing succeeds
                        else if (versionChanged) {
                            shouldLog = true;
                            logStatus = currentlyInAnomaly ? 'Unexpected Mutation' : 'Version Rotation';
                            logColor = currentlyInAnomaly ? 'red' : 'yellow';
                        }
                        // Rule 4: Recovery transition
                        else if (previouslyInAnomaly && !currentlyInAnomaly) {
                            shouldLog = true;
                            logStatus = 'Recovered - Parsed Successfully';
                            logColor = 'green';
                        }

                        if (shouldLog) {
                            newSchemaLogs.push({
                                id: `${latest.dataset_position}-${nodeId}-${currentSchema}-${Date.now()}`,
                                time: timestamp,
                                node: `Node-${nodeId}`,
                                nodeId: nodeId,
                                version: `Schema v${currentSchema.replace('v', '')}`,
                                status: logStatus,
                                color: logColor,
                                raw: n.raw_telemetry,
                                trust: n.trust_score,
                                anomalies: n.anomalies || []
                            });
                        }

                        // Strict state update to halt redundant alerts continuously across intervals
                        lastSchemaRef.current[nodeId] = {
                            version: currentSchema,
                            status: currentlyInAnomaly ? 'anomaly' : 'stable'
                        };
                    }
                });

                if (newSchemaLogs.length > 0) {
                    setSchemaLogs(prev => {
                        const arr = [...newSchemaLogs, ...prev];
                        return arr.slice(0, 100);
                    });
                    // Burst detection: 3+ red anomalies in one batch
                    const redCount = newSchemaLogs.filter(l => l.color === 'red').length;
                    if (redCount >= 3 && !showBurst) {
                        setShowBurst(true);
                        setTimeout(() => setShowBurst(false), 4000);
                    }
                }

                if (newAlerts.length > 0) {
                    setAllAlerts(prev => {
                        const c = [...prev, ...newAlerts];
                        return c.length > 10000 ? c.slice(c.length - 10000) : c;
                    });
                }
            }, [history]);

            // Auto-scroll disabled per user request to prevent page jumps
            /*
            useEffect(() => {
                alertsEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [allAlerts]);
            */

            const currentState = useMemo(() => {
                if (history.length === 0) return null;
                return isLive ? history[history.length - 1] : history[playbackIndex];
            }, [history, isLive, playbackIndex]);

            const handleSlider = (e) => { setIsLive(false); setPlaybackIndex(parseInt(e.target.value, 10)); };
            const goLive = () => setIsLive(true);

            const seekDataset = async (pos) => {
                try {
                    await fetch(`/api/seek/${pos}`, { method: 'POST' });
                    setHistory([]); setAllAlerts([]); setIsLive(true); setSelectedNodeId(null);
                    setLatencySeries([]); setAnomalySeries([]); setLatestIncident(null);
                } catch (e) { }
            };

            const triggerInjector = async (label) => {
                const map = {
                    'Spike DDoS': 'LATENCY_SPIKE',
                    'Ghost Node': 'DECEPTIVE_TELEMETRY',
                    'Rotate Schema': 'SCHEMA_ROTATION',
                    'Identity Theft': 'IDENTITY_THEFT'
                };
                const anomaly = map[label];
                if (!anomaly) return;
                try {
                    const res = await fetch(`/api/seek_event/${anomaly}`, { method: 'POST' });
                    const json = await res.json();
                    if (json.status === 'success') {
                        setIsLive(true); // Keep history intact for seamless burst
                    }
                } catch (e) { }
            };

            // Group alerts by type with count
            const groupedAlerts = useMemo(() => {
                const groups = {};
                allAlerts.forEach(a => {
                    const key = a.anomaly_type;
                    if (!groups[key]) {
                        groups[key] = { type: key, count: 0, nodes: new Set(), lastTs: '', lastNodeId: '', http: a.http, json: a.json, severity: 'critical' };
                    }
                    groups[key].count++;
                    groups[key].nodes.add(a.node_id);
                    groups[key].lastTs = a.timestamp;
                    groups[key].lastNodeId = a.node_id;
                });
                // Categorize severity
                Object.values(groups).forEach(g => {
                    if (g.type.includes('SCHEMA') || g.type.includes('LATENCY')) g.severity = 'moderate';
                    else g.severity = 'critical';
                });
                const arr = Object.values(groups);
                arr.sort((a, b) => (a.severity === 'critical' ? -1 : 1) - (b.severity === 'critical' ? -1 : 1));
                return arr;
            }, [allAlerts]);

            // Get reason text for a node
            const getNodeReason = useCallback((node) => {
                if (!node.anomalies || node.anomalies.length === 0) return 'Clean';
                const reasons = [];
                node.anomalies.forEach(a => {
                    if (a.includes('DECEPTIVE') || a.includes('HTTP')) reasons.push('HTTP mismatch');
                    else if (a.includes('IDENTITY')) reasons.push('Identity theft');
                    else if (a.includes('SCHEMA')) reasons.push('Schema anomaly');
                    else if (a.includes('GHOST')) reasons.push('Ghost node');
                    else reasons.push(a.replace(/_/g, ' '));
                });
                return [...new Set(reasons)].join(', ');
            }, []);

            const getSleeperStatus = useCallback((node) => {
                const lat = node.raw_telemetry.latency * 1000;
                const httpOk = node.raw_telemetry.http_status === 200;
                const jsonOp = node.raw_telemetry.json_payload.status === 'OPERATIONAL';
                const trust = node.trust_score;
                if (jsonOp && (!httpOk || lat > 300 || trust < 50)) return 'sleeper';
                if (jsonOp && (lat >= 100 || trust < 80)) return 'suspicious';
                if (!jsonOp && trust < 50) return 'sleeper';
                if (!jsonOp && trust < 80) return 'suspicious';
                return 'safe';
            }, []);

            // Sleeper Constellation Layout (golden-angle spiral) — MUST be before early return
            const constellationPositions = useMemo(() => {
                if (!currentState || !currentState.nodes) return {};
                const nodes = currentState.nodes;
                const n = nodes.length;
                if (n === 0) return {};
                const positions = {};
                const goldenAngle = Math.PI * (3 - Math.sqrt(5));
                const cx = 500, cy = 300, maxR = 245;
                nodes.forEach((node, i) => {
                    const angle = i * goldenAngle;
                    const radius = maxR * Math.sqrt((i + 0.5) / n);
                    const hash = ((node.node_id * 7919 + 104729) % 1000) / 1000;
                    const jA = (hash - 0.5) * 0.35;
                    const jR = (hash - 0.5) * 16;
                    positions[node.node_id] = {
                        x: cx + (radius + jR) * Math.cos(angle + jA),
                        y: cy + (radius + jR) * Math.sin(angle + jA)
                    };
                });
                return positions;
            }, [currentState]);

            const sleeperStats = useMemo(() => {
                if (!currentState || !currentState.nodes) return { safe: 0, suspicious: 0, sleeper: 0 };
                let safe = 0, suspicious = 0, sleeper = 0;
                currentState.nodes.forEach(n => {
                    const s = getSleeperStatus(n);
                    if (s === 'sleeper') sleeper++;
                    else if (s === 'suspicious') suspicious++;
                    else safe++;
                });
                return { safe, suspicious, sleeper };
            }, [currentState, getSleeperStatus]);

            const processedData = useMemo(() => {
                const startIdx = Math.max(0, playbackIndex - 39);
                const windowHistory = history.slice(startIdx, playbackIndex + 1);

                if (!windowHistory || windowHistory.length === 0) return [];
                const nodeMap = {};

                windowHistory.forEach((tick, tIndex) => {
                    tick.nodes.forEach(node => {
                        if (!nodeMap[node.node_id]) {
                            nodeMap[node.node_id] = [];
                        }

                        while (nodeMap[node.node_id].length < tIndex) {
                            nodeMap[node.node_id].push(null);
                        }

                        nodeMap[node.node_id].push({
                            time: tIndex,
                            latency: Math.round(node.raw_telemetry.latency * 1000),
                            http: node.raw_telemetry.http_status,
                            json: node.raw_telemetry.json_payload.status,
                            trust: node.trust_score
                        });
                    });
                });

                const ranked = Object.entries(nodeMap)
                    .map(([id, data]) => {
                        let score = 0;
                        data.forEach(d => {
                            if (!d) return;
                            if (d.latency > 300) score += 2;
                            if (d.http !== 200) score += 3;
                            if (d.json === "OPERATIONAL" && d.latency > 300) score += 5;
                        });
                        return { id, data, score };
                    })
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 20);

                return ranked;
            }, [history, playbackIndex]);

            const getLatencyColor = (latency) => {
                if (latency < 100) return "#22c55e";
                if (latency < 300) return "#facc15";
                return "#ef4444";
            };

            const isSleeper = (d) => {
                if (!d) return false;
                return (
                    d.json === "OPERATIONAL" &&
                    (d.latency > 300 || d.http !== 200)
                );
            };

            const summary = useMemo(() => {
                let sleepers = 0;
                processedData.forEach(n => {
                    n.data.forEach(d => {
                        if (isSleeper(d)) sleepers++;
                    });
                });
                return { sleepers };
            }, [processedData]);

            if (!currentState) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-[#f5f6f8]">
                        <div className="w-10 h-10 border-3 border-slate-200 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
                        <div className="text-sm text-slate-500 font-medium tracking-wide">SYNCHRONIZING TELEMETRY...</div>
                    </div>
                );
            }

            const TOTAL_REG_NODES = currentState.total_registry_nodes || 500;
            const ACTIVE = currentState.nodes.length;
            const infectedNodes = currentState.nodes.filter(n => n.anomalies.length > 0 || n.trust_score < 80);
            const infectedCount = infectedNodes.length;
            const isUnderAttack = infectedCount > 0;
            const pZero = currentState.patient_zero;

            const uniqueNodeIds = [...new Set(currentState.nodes.map(n => n.node_id))];
            const nodePositions = {};
            const gridCols = Math.ceil(Math.sqrt(uniqueNodeIds.length));
            uniqueNodeIds.forEach((id, i) => {
                const row = Math.floor(i / gridCols);
                const col = i % gridCols;
                nodePositions[id] = {
                    x: 12 + (col * (76 / Math.max(gridCols - 1, 1))),
                    y: 15 + (row * (70 / Math.max(Math.ceil(uniqueNodeIds.length / gridCols) - 1, 1)))
                };
            });

            const datasetPct = Math.round((datasetPos / (currentState.total_events || 10000)) * 100);

            // Selected node data
            const selectedNode = selectedNodeId ? currentState.nodes.find(n => n.node_id === selectedNodeId) : null;

            // --- SCHEMA INTELLIGENCE DASHBOARD COMPUTATIONS ---
            const schemaFailingNodes = currentState ? currentState.nodes.filter(n => n.anomalies && (n.anomalies.includes('SCHEMA_ROTATION') || n.anomalies.includes('SCHEMA'))).length : 0;
            const schemaStability = ACTIVE > 0 ? Math.round(((ACTIVE - schemaFailingNodes) / ACTIVE) * 100) : 100;

            let activeMasterVersion = '1';
            let ringChartSegments = [];
            if (currentState && currentState.nodes.length > 0) {
                const versionCounts = {};
                currentState.nodes.forEach(n => {
                    const v = n.raw_telemetry?.schema_version || '1';
                    versionCounts[v] = (versionCounts[v] || 0) + 1;
                });
                let maxCount = 0;
                const totalNodes = currentState.nodes.length;
                const colors = { '1': '#3b82f6', '2': '#10b981', '3': '#8b5cf6', '4': '#f59e0b' };
                let cumulativePercent = 0;

                ringChartSegments = Object.entries(versionCounts).map(([v, c]) => {
                    if (c > maxCount) { maxCount = c; activeMasterVersion = v; }
                    const percent = c / totalNodes;
                    const dashArray = `${percent * 100} 100`;
                    const offset = -cumulativePercent * 100;
                    cumulativePercent += percent;
                    return { v, count: c, percent: Math.round(percent * 100), color: colors[v] || '#94a3b8', dashArray, offset };
                });
            }


            const filteredSchemaLogs = schemaLogs.filter(log => {
                if (schemaSearchQuery && !log.nodeId.toString().includes(schemaSearchQuery.trim())) return false;
                if (schemaFilterType === 'Success' && log.color !== 'green') return false;
                if (schemaFilterType === 'Anomaly' && log.color !== 'red') return false;
                if (schemaFilterType === 'Rotation' && log.color !== 'yellow') return false;
                return true;
            });

            const groupedSchemaLogs = [];
            for (let log of filteredSchemaLogs) {
                const last = groupedSchemaLogs[groupedSchemaLogs.length - 1];
                if (last && last.nodeId === log.nodeId && last.status === log.status) {
                    last.count = (last.count || 1) + 1;
                    last.time = log.time;
                } else {
                    groupedSchemaLogs.push({ ...log, count: 1 });
                }
            }

            // Flow Engine computations
            const activeFlowLog = selectedSchemaLog || groupedSchemaLogs[0] || null;
            const uniqueVersionCount = ringChartSegments.length;
            const anomalyOnlyLogs = groupedSchemaLogs.filter(l => l.color !== 'green').slice(0, 20);
            const flowState = activeFlowLog ? {
                input: 'active',
                parser: activeFlowLog.color === 'yellow' ? 'warning' : 'active',
                validator: activeFlowLog.color === 'red' ? 'fail' : 'active',
                verdict: activeFlowLog.color === 'red' ? 'fail' : activeFlowLog.color === 'yellow' ? 'warning' : 'pass'
            } : { input: 'idle', parser: 'idle', validator: 'idle', verdict: 'idle' };
            const flowColors = { active: '#22c55e', warning: '#eab308', fail: '#ef4444', pass: '#22c55e', idle: '#94a3b8' };
            const flowBg = { active: 'bg-green-50 border-green-300', warning: 'bg-yellow-50 border-yellow-300', fail: 'bg-red-50 border-red-300', pass: 'bg-green-50 border-green-300', idle: 'bg-slate-50 border-slate-200' };
            const flowText = { active: 'text-green-700', warning: 'text-yellow-700', fail: 'text-red-700', pass: 'text-green-700', idle: 'text-slate-400' };

            return (
                <div className="flex flex-col h-screen overflow-y-auto">

                    {/* ===== TOP NAVBAR ===== */}
                    <nav className="h-[52px] bg-white border-b border-slate-200 flex items-center justify-between px-5 shrink-0 z-10">
                        <div className="flex items-center gap-3">
                            <div className="w-7 h-7 bg-slate-800 rounded flex items-center justify-center">
                                <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                            </div>
                            <div className="flex flex-col justify-center">
                                <div>
                                    <span className="text-sm font-extrabold tracking-tight text-slate-800">AEGIS</span>
                                    <span className="text-[10px] font-medium text-slate-400 tracking-wide ml-1.5 hidden sm:inline">CYBER DEFENSE SYSTEM</span>
                                </div>
                                <div className="text-[8.5px] font-mono text-slate-400 font-medium tracking-widest mt-0.5">
                                    SYS.TIME: {systemTime}
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center gap-6 text-[11px] font-semibold">
                            {/* STATUS - prominent */}
                            <div className={`flex items-center gap-2 px-3 py-1.5 rounded-md ${isUnderAttack ? 'bg-red-50 border border-red-200' : 'bg-green-50 border border-green-200'}`}>
                                <div className={`w-2.5 h-2.5 rounded-full ${isUnderAttack ? 'bg-red-500 animate-pulse' : 'bg-green-500'}`}></div>
                                <span className={`font-bold text-xs ${isUnderAttack ? 'text-red-700' : 'text-green-700'}`}>{isUnderAttack ? 'UNDER ATTACK' : 'SECURE'}</span>
                            </div>

                            {/* P-ZERO - red badge */}
                            {pZero && pZero.confidence > 0 ? (
                                <div className="flex items-center gap-2 bg-red-600 text-white px-3 py-1.5 rounded-md">
                                    <span className="text-[9px] font-bold tracking-wide opacity-80">P-ZERO</span>
                                    <span className="font-bold text-xs">Node {pZero.patient_zero_node}</span>
                                    <span className="text-[9px] bg-white/20 px-1.5 py-0.5 rounded font-mono">{pZero.confidence}%</span>
                                </div>
                            ) : (
                                <div className="flex items-center gap-1.5 text-slate-400">
                                    <span>P-ZERO</span><span className="text-slate-300">—</span>
                                </div>
                            )}

                            {/* ACTIVE / INFECTED grouped */}
                            <div className="flex items-center gap-1 bg-slate-50 border border-slate-200 rounded-md px-3 py-1.5">
                                <span className="text-slate-500">ACTIVE</span>
                                <span className="text-slate-800 font-bold ml-1">{ACTIVE}</span>
                                <div className="w-px h-4 bg-slate-200 mx-2"></div>
                                <span className="text-slate-500">INFECTED</span>
                                <span className={`font-bold ml-1 ${infectedCount > 0 ? 'text-red-600' : 'text-green-600'}`}>{infectedCount}</span>
                            </div>
                        </div>

                        <div className="flex items-center gap-3">
                            <button onClick={isLive ? () => setIsLive(false) : goLive} className="text-[11px] font-bold px-2.5 py-1.5 rounded border border-slate-300 bg-white hover:bg-slate-50">
                                {isLive ? '||' : '>'}
                            </button>
                            <input type="range" min={0} max={history.length > 0 ? history.length - 1 : 0}
                                value={isLive ? history.length - 1 : playbackIndex}
                                onChange={handleSlider}
                                className="w-28 h-1 accent-slate-600" />
                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${isLive ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
                                {isLive ? 'LIVE' : 'DVR'}
                            </span>
                        </div>
                    </nav>

                    {/* ===== ACTION BAR ===== */}
                    <div className="h-8 bg-white border-b border-slate-200 flex justify-end items-center px-5 shrink-0">
                        <div className="flex gap-2 items-center">
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="text-[9px] font-bold px-2.5 py-1 rounded bg-slate-100 border border-slate-300 text-slate-700 hover:bg-slate-200 uppercase tracking-widest transition-colors flex items-center gap-1 shadow-sm">
                                {isDarkMode ? (
                                    <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                                ) : (
                                    <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                                )}
                                {isDarkMode ? 'LIGHT MODE' : 'DARK MODE'}
                            </button>
                            <button onClick={() => setIsHistoryOpen(true)} className="text-[9px] font-bold px-2.5 py-1 rounded bg-slate-100 border border-slate-300 text-slate-700 hover:bg-slate-200 uppercase tracking-widest transition-colors flex items-center gap-1 shadow-sm">
                                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                HISTORY
                            </button>
                            <button onClick={() => seekDataset(0)} className="text-[9px] font-bold px-2.5 py-1 rounded bg-slate-800 border border-slate-800 text-white hover:bg-slate-700 uppercase tracking-widest shadow-sm transition-colors">RESTART DEMO</button>
                            <button onClick={togglePause} title={isPaused ? "Resume Demo" : "Stop Demo"} className={`w-6 h-6 flex items-center justify-center rounded transition-colors shadow-sm ml-1 ${isPaused ? 'bg-green-600 hover:bg-green-500' : 'bg-red-600 hover:bg-red-500'}`}>
                                {isPaused ? (
                                    <svg className="w-3 h-3 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                                ) : (
                                    <div className="w-2.5 h-2.5 bg-white rounded-[2px]" style={{ width: '10px', height: '10px' }}></div>
                                )}
                            </button>
                        </div>
                    </div>

                    {/* ===== SIDEBAR + TAB CONTENT ===== */}
                    <div className="flex flex-1 overflow-hidden">

                        {/* LEFT SIDEBAR */}
                        <aside className="w-[220px] bg-white border-r border-slate-200 flex flex-col shrink-0">
                            <div className="px-4 py-3 border-b border-slate-100">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Navigation</span>
                            </div>

                                                <th className="p-3 pr-5">Identity (L4)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="font-mono text-[10px] text-slate-700">
                                            {historyLog.length === 0 ? (
                                                <tr><td colSpan="11" className="p-8 text-center text-slate-400">Ledger is aggressively clean. Awaiting incidents...</td></tr>
                                            ) : (() => {
                                                let lastDateGroup = '';
                                                const rows = [];
                                                historyLog.forEach((row, idx) => {
                                                    let dateStr = '';
                                                    try { dateStr = new Date(row.timestamp).toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' }); } catch(e) { dateStr = 'Unknown Date'; }
                                                    if (dateStr !== lastDateGroup) {
                                                        lastDateGroup = dateStr;
                                                        rows.push(
                                                            <tr key={`date-${idx}`} className="bg-slate-100 border-y border-slate-200">
                                                                <td colSpan="11" className="p-2 pl-5 text-[9px] font-bold text-slate-600 uppercase tracking-widest">
                                                                    <span className="flex items-center gap-2">
                                                                        <svg className="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                                                        {dateStr}
                                                                    </span>
                                                                </td>
                                                            </tr>
                                                        );
                                                    }
                                                    rows.push(
                                                        <tr key={row.id} 
                                                            className="border-b border-slate-100/80 hover:bg-slate-100 transition-colors cursor-pointer"
                                                            onClick={() => {
                                                                const n = currentState?.nodes?.find(x => String(x.node_id) === String(row.node_id));
                                                                if (n) setOverlayNode(n);
                                                                else {
                                                                    setOverlayNode({
                                                                        node_id: row.node_id,
                                                                        trust_score: row.trust_after,
                                                                        anomalies: [row.anomaly_type],
                                                                        decoded_identity: row.decoded_identity
                                                                    });
                                                                }
                                                            }}
                                                        >
                                                            <td className="p-3 pl-5 font-black text-indigo-600 font-mono text-[9px]">#{row.log_id ?? '—'}</td>
                                                            <td className="p-3 whitespace-nowrap text-slate-400 font-mono">{(() => { try { const d = new Date(row.timestamp); return fmt24(d); } catch(e) { return row.timestamp; } })()}</td>
                                                            <td className="p-3 font-bold text-slate-700">{row.node_id}</td>
                                                            <td className="p-3">{row.anomaly_type.replace(/_/g, ' ')}</td>
                                                            <td className="p-3 text-center">
                                                                <span className={`px-2 py-0.5 rounded text-[8px] font-bold tracking-widest ${row.severity === 'CRITICAL' ? 'bg-red-50 text-red-600 border border-red-100' : row.severity === 'MEDIUM' ? 'bg-amber-50 text-amber-600 border border-amber-100' : row.severity === 'LOW' ? 'bg-orange-50 text-orange-600 border border-orange-100' : 'bg-green-50 text-green-600 border border-green-200'}`}>
                                                                    {row.severity === '0' || row.severity === 0 ? 'NORMAL' : row.severity}
                                                                </span>
                                                            </td>
                                                            <td className="p-3">
                                                                <div className="flex items-center gap-1.5">
                                                                    <span className="text-slate-400">{Math.round(row.trust_before)}</span>
                                                                    <svg className="w-3 h-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                                                    <span className={`font-bold ${row.trust_after < 50 ? 'text-red-500' : 'text-amber-500'}`}>{Math.round(row.trust_after)}</span>
                                                                    <span className="text-red-500 font-bold ml-1">({Math.round(row.trust_delta)})</span>
                                                                </div>
                                                            </td>
                                                            <td className={`p-3 font-mono ${row.http_status !== 200 ? 'text-red-500 font-bold' : 'text-slate-500'}`}>{row.http_status || '—'}</td>
                                                            <td className={`p-3 text-[9px] font-mono ${row.json_status === 'OPERATIONAL' ? 'text-green-600' : 'text-slate-500'}`}>{row.json_status || '—'}</td>
                                                            <td className="p-3 text-slate-400 font-mono text-[9px]">{row.schema_version || '—'}</td>
                                                            <td className="p-3 text-right">
                                                                {row.latency_ms != null
                                                                    ? <span className={`font-mono font-bold ${row.latency_ms > 200 ? 'text-amber-500' : 'text-slate-500'}`}>{Math.round(row.latency_ms)}ms</span>
                                                                    : <span className="text-slate-300">—</span>
                                                                }
                                                            </td>
                                                            <td className="p-3 pr-5 truncate max-w-[120px] text-slate-500" title={row.decoded_identity}>{row.decoded_identity || 'N/A'}</td>
                                                        </tr>
                                                    );
                                                });
                                                return rows;
                                            })()}
                                        </tbody>
                                    </table>
                                </div>
                                {/* Pagination Controls */}
                                <div className="bg-slate-50 border-t border-slate-200 p-3 flex justify-between items-center shrink-0">
                                    <span className="text-[10px] text-slate-500 font-mono">Page {histPage + 1} (Offset: {histPage * 100})</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => setHistPage(p => Math.max(0, p - 1))} disabled={histPage === 0} className={`px-3 py-1 text-[10px] font-bold uppercase tracking-wider rounded transition-colors ${histPage === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed border border-transparent' : 'bg-white text-slate-600 border border-slate-300 hover:bg-slate-50 hover:text-slate-800 shadow-sm'}`}>Previous</button>
                                        <button onClick={() => setHistPage(p => p + 1)} disabled={historyLog.length < 100} className={`px-3 py-1 text-[10px] font-bold uppercase tracking-wider rounded transition-colors ${historyLog.length < 100 ? 'bg-slate-100 text-slate-400 cursor-not-allowed border border-transparent' : 'bg-white text-slate-600 border border-slate-300 hover:bg-slate-50 hover:text-slate-800 shadow-sm'}`}>Next</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
