<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS Defense System — Premium Light Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #0f172a; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Subtle, elegant scrollbar for light theme */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .premium-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
        }
        
        .pulse-subtle { animation: pulseSubtle 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulseSubtle {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        function Dashboard() {
            // Mock data for the static UI layout demo
            const stats = [
                { title: 'Monitored Assets', value: '500', trend: '+12', color: 'text-indigo-600', icon: 'server' },
                { title: 'Global Trust Score', value: '98.4%', trend: '-0.2%', color: 'text-emerald-600', icon: 'shield-check' },
                { title: 'Active Anomalies', value: '3', trend: '+2', color: 'text-rose-500', icon: 'exclamation-circle' },
                { title: 'Average Latency', value: '118ms', trend: '-5ms', color: 'text-slate-600', icon: 'clock' },
            ];

            const alerts = [
                { node: 'Node 416', type: 'Identity Theft', time: '12s ago', level: 'high' },
                { node: 'Node 234', type: 'Schema Rotation', time: '45s ago', level: 'medium' },
                { node: 'Node 345', type: 'Latency Spike', time: '1m ago', level: 'low' },
            ];

            return (
                <div className="flex flex-col h-screen">
                    {/* TOP NAVIGATION — Clean White Corporate Header */}
                    <header className="bg-white border-b border-slate-200 premium-shadow px-6 py-3 flex items-center justify-between shrink-0 z-10 relative">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 text-white p-1.5 rounded-lg shadow-sm">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                            </div>
                            <h1 className="text-xl font-bold text-slate-800 tracking-tight">AEGIS <span className="font-medium text-slate-400">Cyber Defense</span></h1>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className="bg-rose-50 text-rose-600 px-3 py-1 rounded-full border border-rose-100 text-xs font-bold tracking-widest flex items-center gap-2">
                                <div className="w-2 h-2 bg-rose-500 rounded-full pulse-subtle"></div>
                                UNDER ATTACK
                            </div>
                            <div className="h-6 w-px bg-slate-200"></div>
                            <span className="text-sm font-medium text-slate-500">Forensic Auditor</span>
                            <div className="w-8 h-8 rounded-full bg-slate-200 border-2 border-white premium-shadow"></div>
                        </div>
                    </header>

                    {/* MAIN CONTENT GRID */}
                    <main className="flex-1 p-6 overflow-hidden flex flex-col gap-6 w-full max-w-7xl mx-auto">
                        
                        {/* KPI Metrics Row */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 shrink-0">
                            {stats.map((stat, i) => (
                                <div key={i} className="bg-white rounded-xl border border-slate-200 premium-shadow p-4 flex flex-col justify-between">
                                    <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">{stat.title}</div>
                                    <div className="flex items-baseline justify-between">
                                        <div className={`text-2xl font-bold ${stat.color}`}>{stat.value}</div>
                                        <div className={`text-xs font-medium ${stat.trend.startsWith('+') ? 'text-amber-500' : 'text-emerald-500'}`}>{stat.trend}</div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Top Split: Forensic Map + Alerts sidebar */}
                        <div className="flex flex-col lg:flex-row gap-6 flex-1 min-h-0">
                            
                            {/* Map Container - Professional Canvas */}
                            <div className="flex-1 bg-white rounded-xl border border-slate-200 premium-shadow overflow-hidden flex flex-col relative">
                                <div className="px-5 py-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <h2 className="text-sm font-bold text-slate-700">Forensic Propagation Map</h2>
                                    <div className="text-xs text-slate-400 font-mono">Dataset Stream: 7500/10000</div>
                                </div>
                                
                                <div className="flex-1 relative bg-slate-50/30">
                                    {/* Grid background pattern */}
                                    <div className="absolute inset-0 opacity-[0.03]" style={{backgroundImage: 'linear-gradient(to right, #94a3b8 1px, transparent 1px), linear-gradient(to bottom, #94a3b8 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>
                                    
                                    <svg className="absolute inset-0 w-full h-full pointer-events-none">
                                        {/* Simple drawn line indicating theft propagation */}
                                        <line x1="30%" y1="50%" x2="70%" y2="50%" stroke="#f43f5e" strokeWidth="2" strokeDasharray="5 5" className="pulse-subtle" />
                                    </svg>

                                    {/* Victim Node */}
                                    <div className="absolute top-1/2 left-[30%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
                                        <div className="w-12 h-12 bg-white rounded-full border-4 border-slate-200 shadow-md flex items-center justify-center z-10">
                                            <div className="w-4 h-4 bg-emerald-500 rounded-full"></div>
                                        </div>
                                        <div className="mt-2 bg-white/90 backdrop-blur px-2 py-1 rounded border border-slate-200 shadow-sm text-[10px] font-mono font-bold text-slate-600">Node 345</div>
                                        <div className="mt-1 text-[9px] text-slate-400 font-mono tracking-widest">OWNER</div>
                                    </div>

                                    {/* Attacker Node */}
                                    <div className="absolute top-1/2 left-[70%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
                                        <div className="w-16 h-16 bg-rose-50 rounded-full border-4 border-rose-200 shadow-[0_0_15px_rgba(244,63,94,0.2)] flex items-center justify-center z-10 pulse-subtle">
                                            <div className="w-5 h-5 bg-rose-500 rounded-full"></div>
                                        </div>
                                        <div className="mt-2 bg-white/90 backdrop-blur px-2 py-1 rounded border border-rose-200 shadow-sm text-[10px] font-mono font-bold text-rose-600 animate-bounce">Node 416 ☣️</div>
                                        <div className="mt-1 text-[9px] text-rose-500 font-mono font-bold tracking-widest bg-rose-100 px-1 rounded">THIEF</div>
                                    </div>
                                </div>
                            </div>

                            {/* Threat Feed */}
                            <div className="w-full lg:w-80 bg-white rounded-xl border border-slate-200 premium-shadow flex flex-col shrink-0">
                                <div className="px-5 py-3 border-b border-slate-100 bg-slate-50/50">
                                    <h2 className="text-sm font-bold text-slate-700 flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-rose-500 pulse-subtle"></span> Threat Feed
                                    </h2>
                                </div>
                                <div className="flex-1 overflow-y-auto p-3 space-y-2">
                                    {alerts.map((alert, i) => (
                                        <div key={i} className={`p-3 rounded-lg border-l-4 shadow-sm text-sm ${alert.level === 'high' ? 'border-rose-500 bg-rose-50/50 text-rose-900' : alert.level === 'medium' ? 'border-amber-400 bg-amber-50/50 text-amber-900' : 'border-slate-300 bg-slate-50 text-slate-700'}`}>
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="font-bold">{alert.type}</span>
                                                <span className="text-[10px] opacity-60 font-mono">{alert.time}</span>
                                            </div>
                                            <div className="text-xs opacity-80 font-mono">{alert.node} — Trust Drop Detect</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Bottom Row: Data Table - Clean Enterprise Data Grid */}
                        <div className="h-1/3 bg-white rounded-xl border border-slate-200 premium-shadow flex flex-col shrink-0">
                            <div className="px-5 py-3 border-b border-slate-100 bg-slate-50/50 flex justify-between">
                                <h2 className="text-sm font-bold text-slate-700">Forensic Audit Log</h2>
                                <button className="text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition">Export CSV</button>
                            </div>
                            <div className="flex-1 overflow-auto p-0">
                                <table className="w-full text-left text-xs whitespace-nowrap">
                                    <thead className="bg-slate-50 sticky top-0 border-b border-slate-200 z-10 text-slate-500 font-semibold tracking-wider">
                                        <tr>
                                            <th className="px-5 py-3">Timestamp</th>
                                            <th className="px-5 py-3">Node</th>
                                            <th className="px-5 py-3">HTTP Status</th>
                                            <th className="px-5 py-3">Identity (Base64)</th>
                                            <th className="px-5 py-3">Infected Flag</th>
                                            <th className="px-5 py-3">Trust Score</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 text-slate-600 font-mono">
                                        <tr className="hover:bg-slate-50 transition bg-rose-50/30">
                                            <td className="px-5 py-2">T-4m2s</td>
                                            <td className="px-5 py-2 font-bold text-rose-600">Node 416</td>
                                            <td className="px-5 py-2">206 (244ms)</td>
                                            <td className="px-5 py-2 font-medium text-slate-800">SN-1531 <span className="text-rose-500 font-bold ml-1">(!DUP)</span></td>
                                            <td className="px-5 py-2">
                                                <span className="bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full font-bold text-[10px]">TRUE</span>
                                            </td>
                                            <td className="px-5 py-2 flex items-center gap-2">
                                                <div className="w-24 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                                    <div className="h-full bg-rose-500 w-[20%]"></div>
                                                </div>
                                                <span className="text-rose-600 font-bold">20</span>
                                            </td>
                                        </tr>
                                        <tr className="hover:bg-slate-50 transition">
                                            <td className="px-5 py-2">T-4m2s</td>
                                            <td className="px-5 py-2 font-bold text-indigo-600">Node 345</td>
                                            <td className="px-5 py-2">200 (112ms)</td>
                                            <td className="px-5 py-2">SN-1531</td>
                                            <td className="px-5 py-2">
                                                <span className="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-full font-semibold text-[10px]">FALSE</span>
                                            </td>
                                            <td className="px-5 py-2 flex items-center gap-2">
                                                <div className="w-24 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                                    <div className="h-full bg-emerald-500 w-[95%]"></div>
                                                </div>
                                                <span className="text-emerald-600 font-bold">95</span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </main>
                </div>
            )
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
